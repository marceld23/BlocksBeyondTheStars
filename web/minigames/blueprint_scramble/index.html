<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css"></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Blueprint Scramble", de: "Blaupausen-Puzzle" }, difficulty: 2,
  desc: { en: "A salvaged blueprint came in scrambled. Rotate each fragment until the schematic is whole again.",
          de: "Eine geborgene Blaupause ist verdreht. Drehe jedes Fragment, bis das Schema wieder stimmt." },
  hint: { en: "Click a fragment to rotate it (corner marker belongs top-left)", de: "Fragment anklicken zum Drehen (Eck-Marke gehört oben links)" },
  help: [{ en: "Click a fragment to rotate it 90°", de: "Fragment anklicken, um es um 90° zu drehen" },
         { en: "When every fragment's bright corner marker sits top-left, the blueprint is solved", de: "Wenn die helle Eck-Marke jedes Fragments oben links sitzt, ist die Blaupause gelöst" }],
  create: function (api) {
    var SZ = 4, TILE = 92, W = SZ * TILE;
    var ctx = api.canvas(W, W).getContext('2d');
    var src = document.createElement('canvas'); src.width = W; src.height = W; var sx = src.getContext('2d');
    var rot, moves, done;
    function paintBlueprint() {
      sx.fillStyle = '#081426'; sx.fillRect(0, 0, W, W);
      sx.strokeStyle = '#46d6ff'; sx.lineWidth = 4; sx.lineCap = 'round';
      for (var i = 0; i < 7; i++) { sx.beginPath(); sx.moveTo(api.rand(W), api.rand(W)); sx.lineTo(api.rand(W), api.rand(W)); sx.stroke(); }
      sx.lineWidth = 2;
      for (var j = 0; j < 6; j++) { sx.beginPath(); sx.arc(api.rand(W), api.rand(W), 8 + api.rand(20), 0, 7); sx.stroke(); }
      sx.strokeStyle = 'rgba(124,255,176,0.7)'; sx.lineWidth = 3; sx.beginPath(); sx.moveTo(10, 10); sx.lineTo(W - 10, W - 14); sx.stroke();
      // per-tile orientation marker (top-left of each tile when solved)
      sx.fillStyle = '#7CFFB0';
      for (var c = 0; c < SZ; c++) for (var r = 0; r < SZ; r++) { sx.beginPath(); sx.arc(c * TILE + 12, r * TILE + 12, 5, 0, 7); sx.fill(); }
    }
    function reset() {
      paintBlueprint(); moves = 0; done = false; rot = [];
      for (var i = 0; i < SZ * SZ; i++) rot.push(1 + api.rand(3)); // never start solved
      api.hud({ moves: 0 }); draw();
    }
    function draw() {
      ctx.clearRect(0, 0, W, W);
      for (var c = 0; c < SZ; c++) for (var r = 0; r < SZ; r++) {
        var idx = r * SZ + c; ctx.save();
        ctx.translate(c * TILE + TILE / 2, r * TILE + TILE / 2); ctx.rotate(rot[idx] * Math.PI / 2);
        ctx.drawImage(src, c * TILE, r * TILE, TILE, TILE, -TILE / 2, -TILE / 2, TILE, TILE);
        ctx.restore();
        ctx.strokeStyle = 'rgba(70,214,255,0.25)'; ctx.lineWidth = 1; ctx.strokeRect(c * TILE + 0.5, r * TILE + 0.5, TILE, TILE);
      }
    }
    api.pointer(function (p) {
      if (p.type !== 'down' || done) return; var c = (p.x / TILE) | 0, r = (p.y / TILE) | 0;
      if (c < 0 || r < 0 || c >= SZ || r >= SZ) return; var idx = r * SZ + c;
      rot[idx] = (rot[idx] + 1) % 4; moves++; api.hud({ moves: moves }); draw();
      if (rot.every(function (v) { return v === 0; })) { done = true; var rating = moves <= SZ * SZ * 1.5 ? 3 : moves <= SZ * SZ * 3 ? 2 : 1; api.after(function () { api.complete({ score: Math.max(50, 800 - moves * 12), rating: rating }); }, 250); }
    });
    return { start: reset };
  }
});
</script></body></html>
