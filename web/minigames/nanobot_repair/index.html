<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css"></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Nanobot Repair", de: "Nanobot-Reparatur" }, difficulty: 3,
  desc: { en: "Route the nanobot across the circuit graph to repair every damaged node before its energy runs out. Plan the shortest path.",
          de: "Leite den Nanobot über den Schaltungsgraphen, um jeden beschädigten Knoten zu reparieren, bevor die Energie ausgeht. Plane den kürzesten Weg." },
  hint: { en: "Click a connected node to move there (costs energy)", de: "Verbundenen Knoten anklicken zum Hinbewegen (kostet Energie)" },
  help: [{ en: "Click a node linked to the bot to move there; moving costs energy by distance", de: "Mit dem Bot verbundenen Knoten anklicken; Bewegung kostet Energie je Distanz" },
         { en: "Reach every orange damaged node to repair it", de: "Erreiche jeden orangen beschädigten Knoten zur Reparatur" }],
  create: function (api) {
    var W = 660, H = 440, ctx = api.canvas(W, H).getContext('2d');
    var nodes, edges, bot, energy, done;
    function dist(a, b) { return Math.hypot(nodes[a].x - nodes[b].x, nodes[a].y - nodes[b].y); }
    function reset() {
      nodes = []; edges = {}; done = false;
      var N = 9; for (var i = 0; i < N; i++) nodes.push({ x: 60 + api.rand(W - 120), y: 50 + api.rand(H - 100), repair: false });
      // Guaranteed-connected graph: a random spanning tree first (every node links back to an earlier one), so
      // the bot can ALWAYS reach every damaged node — then enrich with each node's 2 nearest for route choice.
      for (var st = 1; st < N; st++) { var pj = api.rand(st); edges[st + '-' + pj] = 1; edges[pj + '-' + st] = 1; }
      for (var a = 0; a < N; a++) { var d = []; for (var b = 0; b < N; b++) if (b !== a) d.push([dist(a, b), b]); d.sort(function (p, q) { return p[0] - q[0]; });
        for (var k = 0; k < 2; k++) { var bb = d[k][1]; edges[a + '-' + bb] = 1; edges[bb + '-' + a] = 1; } }
      var order = api.shuffle(nodes.map(function (_, i) { return i; }));
      bot = order[0]; for (var t = 1; t <= 4; t++) nodes[order[t]].repair = true;
      energy = 120; api.hud({ energy: energy, repaired: '0/4' }); draw();
    }
    api.pointer(function (p) {
      if (p.type !== 'down' || done) return;
      var target = -1, bestD = 26 * 26; for (var i = 0; i < nodes.length; i++) { var dd = (nodes[i].x - p.x) * (nodes[i].x - p.x) + (nodes[i].y - p.y) * (nodes[i].y - p.y); if (dd < bestD) { bestD = dd; target = i; } }
      if (target < 0 || target === bot || !edges[bot + '-' + target]) return;
      energy -= Math.round(dist(bot, target) / 12); bot = target;
      if (nodes[bot].repair && !nodes[bot].fixed) { nodes[bot].fixed = true; energy -= 4; }
      var rc = 0, total = 0; for (var j = 0; j < nodes.length; j++) { if (nodes[j].repair) { total++; if (nodes[j].fixed) rc++; } }
      api.hud({ energy: Math.max(0, energy), repaired: rc + '/' + total }); draw();
      if (rc === total) { done = true; var rating = energy > 70 ? 3 : energy > 35 ? 2 : 1; api.complete({ score: Math.max(50, 200 + energy * 4), rating: rating }); return; }
      if (energy <= 0) { done = true; api.fail({ score: rc * 50 }); }
    });
    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.strokeStyle = 'rgba(70,214,255,0.22)'; ctx.lineWidth = 2;
      for (var key in edges) { var pr = key.split('-'); if (+pr[0] < +pr[1]) { ctx.beginPath(); ctx.moveTo(nodes[+pr[0]].x, nodes[+pr[0]].y); ctx.lineTo(nodes[+pr[1]].x, nodes[+pr[1]].y); ctx.stroke(); } }
      // highlight reachable
      for (var i = 0; i < nodes.length; i++) { if (edges[bot + '-' + i]) { ctx.strokeStyle = '#46d6ff'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(nodes[bot].x, nodes[bot].y); ctx.lineTo(nodes[i].x, nodes[i].y); ctx.stroke(); } }
      for (i = 0; i < nodes.length; i++) { var n = nodes[i]; ctx.beginPath(); ctx.arc(n.x, n.y, 11, 0, 7);
        ctx.fillStyle = n.repair ? (n.fixed ? '#7CFFB0' : '#ffc04d') : 'rgba(70,214,255,0.4)'; ctx.fill(); }
      var b = nodes[bot]; ctx.fillStyle = '#fff'; ctx.shadowColor = '#46d6ff'; ctx.shadowBlur = 12; ctx.beginPath(); ctx.arc(b.x, b.y, 7, 0, 7); ctx.fill(); ctx.shadowBlur = 0;
    }
    return { start: reset };
  }
});
</script></body></html>
