<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css"></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Laser Mirror Grid", de: "Laser-Spiegelgitter" }, difficulty: 3,
  desc: { en: "Toggle the mirrors so the beam from the emitter reaches the target node.",
          de: "Schalte die Spiegel um, damit der Strahl des Emitters den Zielknoten erreicht." },
  hint: { en: "Click a mirror to flip it ( / ↔ \\ )", de: "Spiegel anklicken zum Umschalten ( / ↔ \\ )" },
  help: [{ en: "Click a mirror to switch between / and \\", de: "Spiegel anklicken: zwischen / und \\ wechseln" },
         { en: "Route the beam from the emitter to the green target", de: "Leite den Strahl vom Emitter zum grünen Ziel" }],
  create: function (api) {
    var SZ = 8, CELL = 56, W = SZ * CELL, ctx = api.canvas(W, W).getContext('2d');
    var DELTA = { E: [1, 0], W: [-1, 0], N: [0, -1], S: [0, 1] };
    var REF = { '/': { E: 'N', N: 'E', W: 'S', S: 'W' }, '\\': { E: 'S', S: 'E', W: 'N', N: 'W' } };
    var mirror, src, target, done, moves;
    function key(x, y) { return y * SZ + x; }
    function reset() {
      mirror = {}; done = false; moves = 0; api.hud({ moves: 0 });
      var sy = 1 + api.rand(SZ - 2); src = { x: 0, y: sy };
      var cx = 2 + api.rand(SZ - 4); var ty; do { ty = api.rand(SZ); } while (ty === sy);
      target = { x: SZ - 1, y: ty };
      var correct = ty < sy ? '/' : '\\';
      mirror[key(cx, sy)] = '/'; mirror[key(cx, ty)] = '/'; // exact orientation set below
      mirror[key(cx, sy)] = correct; mirror[key(cx, ty)] = correct;
      // beam solution cells (to keep decoys clear)
      var used = {}; used[key(cx, sy)] = used[key(cx, ty)] = 1;
      for (var x = 0; x <= cx; x++) used[key(x, sy)] = 1;
      var lo = Math.min(sy, ty), hi = Math.max(sy, ty); for (var y = lo; y <= hi; y++) used[key(cx, y)] = 1;
      for (var x2 = cx; x2 < SZ; x2++) used[key(x2, ty)] = 1;
      // decoys off the solution path
      var d = 0; while (d < 3) { var rx = 1 + api.rand(SZ - 2), ry = api.rand(SZ), k = key(rx, ry); if (used[k] || mirror[k] || (rx === target.x && ry === target.y)) continue; mirror[k] = api.rand(2) ? '/' : '\\'; d++; }
      // Scramble the two path mirrors — but never hand the player an already-solved board: re-roll until the
      // beam does NOT reach the target (only 1 of the 4 orientation combos solves it, so this resolves fast).
      var tries = 0;
      do {
        mirror[key(cx, sy)] = api.rand(2) ? '/' : '\\'; mirror[key(cx, ty)] = api.rand(2) ? '/' : '\\';
      } while (trace().win && ++tries < 20);
      draw();
    }
    function trace() {
      var x = src.x, y = src.y, dir = 'E', seg = [[x, y]], g = 0, win = false;
      while (g++ < 300) { var dd = DELTA[dir]; x += dd[0]; y += dd[1]; if (x < 0 || y < 0 || x >= SZ || y >= SZ) break; seg.push([x, y]); if (x === target.x && y === target.y) { win = true; break; } var m = mirror[key(x, y)]; if (m) dir = REF[m][dir]; }
      return { seg: seg, win: win };
    }
    api.pointer(function (p) {
      if (p.type !== 'down' || done) return; var cx = (p.x / CELL) | 0, cy = (p.y / CELL) | 0, k = key(cx, cy);
      if (!mirror[k]) return; mirror[k] = mirror[k] === '/' ? '\\' : '/'; moves++; api.hud({ moves: moves });
      var t = trace(); draw(t); if (t.win) { done = true; var rating = moves <= 2 ? 3 : moves <= 5 ? 2 : 1; api.after(function () { api.complete({ score: Math.max(50, 500 - moves * 20), rating: rating }); }, 250); }
    });
    function draw(t) {
      t = t || trace(); ctx.clearRect(0, 0, W, W);
      ctx.strokeStyle = 'rgba(70,214,255,0.10)'; ctx.lineWidth = 1;
      for (var i = 1; i < SZ; i++) { ctx.beginPath(); ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, W); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, i * CELL); ctx.lineTo(W, i * CELL); ctx.stroke(); }
      // beam
      ctx.strokeStyle = t.win ? '#7CFFB0' : '#ff6b6b'; ctx.lineWidth = 3; ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 8; ctx.beginPath();
      for (var s = 0; s < t.seg.length; s++) { var px = t.seg[s][0] * CELL + CELL / 2, py = t.seg[s][1] * CELL + CELL / 2; if (s === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py); }
      ctx.stroke(); ctx.shadowBlur = 0;
      // mirrors
      ctx.strokeStyle = '#cfe9f5'; ctx.lineWidth = 4;
      for (var k in mirror) { var mx = (k % SZ) * CELL, my = ((k / SZ) | 0) * CELL; ctx.beginPath(); if (mirror[k] === '/') { ctx.moveTo(mx + 12, my + CELL - 12); ctx.lineTo(mx + CELL - 12, my + 12); } else { ctx.moveTo(mx + 12, my + 12); ctx.lineTo(mx + CELL - 12, my + CELL - 12); } ctx.stroke(); }
      // emitter + target
      ctx.fillStyle = '#46d6ff'; ctx.beginPath(); ctx.arc(src.x * CELL + CELL / 2, src.y * CELL + CELL / 2, 9, 0, 7); ctx.fill();
      ctx.strokeStyle = t.win ? '#7CFFB0' : '#7790a0'; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(target.x * CELL + CELL / 2, target.y * CELL + CELL / 2, 11, 0, 7); ctx.stroke();
    }
    return { start: reset };
  }
});
</script></body></html>
