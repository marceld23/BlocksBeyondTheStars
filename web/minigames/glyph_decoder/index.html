<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css">
<style>
 .gdwrap{display:flex;flex-direction:column;align-items:center;gap:22px;width:560px}
 .gdstudy{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;width:100%}
 .gdpair{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:8px;padding:10px 14px;background:var(--panel2)}
 .gdpair .g{font-size:40px;color:var(--cyan)}
 .gdpair .m{color:var(--ink);text-transform:uppercase;letter-spacing:.06em}
 .gdq{font-size:64px;color:var(--cyan);text-shadow:0 0 16px rgba(70,214,255,.5)}
 .gdopts{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
 .gdinfo{color:var(--muted);text-transform:uppercase;letter-spacing:.12em;font-size:14px}
</style></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Alien Glyph Decoder", de: "Alien-Glyphen-Entschl√Љssler" }, difficulty: 2,
  desc: { en: "Study the glyph translations, then decode them from memory before the signal fades.",
          de: "Pr√§ge dir die Glyphen-√Ьbersetzungen ein und entschl√Љssle sie dann aus dem Ged√§chtnis." },
  hint: { en: "Memorise the pairs, then pick the meaning for each glyph", de: "Paare merken, dann Bedeutung pro Glyphe w√§hlen" },
  help: [{ en: "First a study phase shows each glyph's meaning", de: "Zuerst zeigt eine Lernphase die Bedeutung jeder Glyphe" },
         { en: "Then choose the right meaning for each glyph", de: "Dann die richtige Bedeutung pro Glyphe w√§hlen" }],
  create: function (api) {
    var GLYPHS = ['вЯБ', 'вПГ', 'вНЯ', 'вОФ', 'вМђ', 'вПІ', 'вЯТ', 'вНЙ'];
    var MEAN = [{ en: "Star", de: "Stern" }, { en: "Home", de: "Heimat" }, { en: "Danger", de: "Gefahr" }, { en: "Water", de: "Wasser" },
                { en: "Energy", de: "Energie" }, { en: "Void", de: "Leere" }, { en: "Ally", de: "Verb√Љndeter" }, { en: "Path", de: "Pfad" }];
    var wrap = api.el('div', 'gdwrap', api.stage);
    var pairs, qi, correct, asking;
    function reset() {
      var gi = api.shuffle(GLYPHS.slice()).slice(0, 4), mi = api.shuffle(MEAN.slice()).slice(0, 4);
      pairs = gi.map(function (g, i) { return { g: g, m: mi[i] }; });
      qi = 0; correct = 0; asking = false; api.hud({ decoded: '0/4' });
      study();
    }
    function study() {
      wrap.innerHTML = ''; api.el('div', 'gdinfo', wrap, api.t({ en: "Memorise вАФ decoding starts soon", de: "Einpr√§gen вАФ Entschl√Љsselung beginnt gleich" }));
      var grid = api.el('div', 'gdstudy', wrap);
      pairs.forEach(function (p) { var row = api.el('div', 'gdpair', grid); api.el('div', 'g', row, p.g); api.el('div', 'm', row, api.t(p.m)); });
      var t = 5; var info = wrap.firstChild;
      var iv = api.every(function () { t--; info.textContent = api.t({ en: "Decoding in ", de: "Entschl√Љsselung in " }) + t; if (t <= 0) { api.stopTimer(iv); ask(); } }, 1000);
    }
    function ask() {
      asking = true; if (qi >= pairs.length) { var rating = correct === 4 ? 3 : correct >= 3 ? 2 : 1; api.complete({ score: correct * 250, rating: rating }); return; }
      wrap.innerHTML = ''; api.el('div', 'gdinfo', wrap, api.t({ en: "What does this glyph mean?", de: "Was bedeutet diese Glyphe?" }));
      api.el('div', 'gdq', wrap, pairs[qi].g);
      var opts = api.shuffle(MEAN.slice()).filter(function (m) { return m === pairs[qi].m || Math.random() < 0.5; }).slice(0, 4);
      if (opts.indexOf(pairs[qi].m) < 0) opts[0] = pairs[qi].m;
      opts = api.shuffle(opts);
      var row = api.el('div', 'gdopts', wrap);
      opts.forEach(function (m) { var b = api.el('button', 'bbts-btn', row, api.t(m)); api.clickable(b, function () { answer(m, b); }); });
    }
    function answer(m, b) {
      if (!asking) return; asking = false;
      if (m === pairs[qi].m) { correct++; b.style.background = 'var(--ok)'; b.style.color = '#04121c'; } else { b.style.borderColor = 'var(--bad)'; b.style.color = 'var(--bad)'; }
      api.hud({ decoded: (qi + 1) + '/4' });
      qi++; api.after(ask, 500);
    }
    return { start: reset };
  }
});
</script></body></html>
