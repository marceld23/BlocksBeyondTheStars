<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css">
<style>
 .smgrid{display:grid;grid-template-columns:repeat(4,96px);gap:12px}
 .smcard{width:96px;height:96px;border-radius:10px;font-size:44px;display:flex;align-items:center;justify-content:center;
   background:linear-gradient(160deg,#103247,#0a2030);border:1px solid var(--line);color:transparent;cursor:pointer;transition:background .15s,color .05s}
 .smcard.up{background:rgba(70,214,255,0.12);color:var(--cyan);text-shadow:0 0 12px rgba(70,214,255,.6)}
 .smcard.done{background:rgba(124,255,176,0.12);border-color:rgba(124,255,176,.5);color:var(--ok);cursor:default}
</style></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Star Map Memory", de: "Sternkarten-Gedächtnis" }, difficulty: 1,
  desc: { en: "Navigator training: flip the chart tiles two at a time and find every matching pair.",
          de: "Navigatoren-Training: drehe die Karten paarweise um und finde alle Paare." },
  hint: { en: "Click two cards to find a pair", de: "Zwei Karten anklicken, um ein Paar zu finden" },
  help: [{ en: "Click a card to reveal it, then a second to find its match", de: "Karte aufdecken, dann zweite suchen" },
         { en: "Fewer moves = a higher rating", de: "Weniger Züge = bessere Bewertung" }],
  create: function (api) {
    var GLYPHS = ['✦', '✧', '✪', '✷', '❖', '◈', '⬢', '⚛'];
    var grid = api.el('div', 'smgrid', api.stage);
    var first, lock, moves, matched;
    function reset() {
      grid.innerHTML = ''; first = null; lock = false; moves = 0; matched = 0; api.hud({ moves: 0, pairs: '0/8' });
      var deck = api.shuffle(GLYPHS.concat(GLYPHS).slice());
      deck.forEach(function (g) { var el = api.el('div', 'smcard', grid); el.dataset.g = g; api.clickable(el, function () { flip(el); }); });
    }
    function flip(el) {
      if (lock || el.classList.contains('up') || el.classList.contains('done')) return;
      el.classList.add('up'); el.textContent = el.dataset.g;
      if (!first) { first = el; return; }
      moves++; api.hud({ moves: moves });
      if (first.dataset.g === el.dataset.g) { first.classList.add('done'); el.classList.add('done'); first = null; matched++; api.hud({ pairs: matched + '/8' });
        if (matched === 8) { var rating = moves <= 10 ? 3 : moves <= 16 ? 2 : 1; api.complete({ score: Math.max(50, 2000 - (moves - 8) * 60), rating: rating }); } }
      else { lock = true; var a = first, b = el; first = null; api.after(function () { a.classList.remove('up'); b.classList.remove('up'); a.textContent = ''; b.textContent = ''; lock = false; }, 650); }
    }
    return { start: reset };
  }
});
</script></body></html>
