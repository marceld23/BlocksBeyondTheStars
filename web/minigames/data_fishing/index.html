<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css"></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Data Fishing", de: "Daten-Fang" }, difficulty: 2,
  desc: { en: "Catch the clean data packets streaming down and let the corrupted ones pass — recover enough before the integrity is lost.",
          de: "Fang die sauberen Datenpakete und lass die beschädigten durch — berge genug, bevor die Integrität verloren ist." },
  hint: { en: "← → / mouse move the collector · catch cyan, avoid red", de: "← → / Maus bewegen · cyan fangen, rot meiden" },
  help: [{ en: "Move the collector to catch cyan packets (gold = bonus)", de: "Sammler bewegen, um cyan Pakete zu fangen (gold = Bonus)" },
         { en: "Catching a red packet costs integrity — three losses ends it", de: "Ein rotes Paket kostet Integrität — drei Verluste beenden es" }],
  create: function (api) {
    var W = 640, H = 440, ctx = api.canvas(W, H).getContext('2d');
    var cat, pks, integ, prog, need, done, spawn;
    function reset() { cat = { x: W / 2, w: 90 }; pks = []; integ = 3; prog = 0; need = 100; done = false; spawn = 0; api.hud({ data: '0/' + need, integrity: integ }); }
    api.pointer(function (p) { if (p.type === 'move' || p.type === 'down') cat.x = Math.max(cat.w / 2, Math.min(W - cat.w / 2, p.x)); });
    api.loop(function (dt) {
      if (done) return;
      if (api.held('Left')) cat.x = Math.max(cat.w / 2, cat.x - 320 * dt);
      if (api.held('Right')) cat.x = Math.min(W - cat.w / 2, cat.x + 320 * dt);
      spawn += dt; if (spawn > 0.55) { spawn = 0; var r = Math.random(); var type = r < 0.62 ? 'good' : r < 0.9 ? 'bad' : 'rare'; pks.push({ x: 24 + api.rand(W - 48), y: -10, vy: 120 + api.rand(90), type: type }); }
      for (var i = pks.length - 1; i >= 0; i--) { var pk = pks[i]; pk.y += pk.vy * dt;
        if (pk.y > H - 34 && pk.y < H - 8 && Math.abs(pk.x - cat.x) < cat.w / 2) {
          if (pk.type === 'bad') { integ--; api.hud({ integrity: integ }); if (integ <= 0) { done = true; api.fail({ score: prog }); return; } }
          else { prog += pk.type === 'rare' ? 18 : 8; api.hud({ data: Math.min(need, prog) + '/' + need }); }
          pks.splice(i, 1); continue;
        }
        if (pk.y > H + 12) pks.splice(i, 1);
      }
      if (prog >= need) { done = true; var rating = integ >= 3 ? 3 : integ === 2 ? 2 : 1; api.complete({ score: prog * 4 + integ * 40, rating: rating }); return; }
      draw();
    });
    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (var i = 0; i < pks.length; i++) { var pk = pks[i]; ctx.fillStyle = pk.type === 'bad' ? '#ff6b6b' : pk.type === 'rare' ? '#ffd86b' : '#46d6ff'; ctx.fillRect(pk.x - 7, pk.y - 7, 14, 14); }
      // Collector — no per-frame shadowBlur (it's very costly in the software-rendered embedded browser and was
      // the main cause of stutter); a brighter two-tone bar keeps it readable without the blur.
      ctx.fillStyle = '#7CFFB0'; ctx.fillRect(cat.x - cat.w / 2, H - 22, cat.w, 10);
      ctx.fillStyle = 'rgba(124,255,176,0.35)'; ctx.fillRect(cat.x - cat.w / 2, H - 12, cat.w, 4);
    }
    return { start: reset };
  }
});
</script></body></html>
