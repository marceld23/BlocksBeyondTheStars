<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css"></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Micro Miner", de: "Mikro-Miner" }, difficulty: 2,
  desc: { en: "Dig for ore and haul it back to the surface to bank it. Fill the quota before your energy runs dry — you'll need several trips and a tight route.",
          de: "Grab nach Erz und bring es zur Oberfläche, um es einzuzahlen. Erfülle die Quote, bevor die Energie leer ist — du brauchst mehrere Fahrten und eine sparsame Route." },
  hint: { en: "← ↑ ↓ → dig / move · surface (top row) to bank · fill the DEPOT quota", de: "← ↑ ↓ → graben / bewegen · Oberfläche (oben) zahlt ein · DEPOT-Quote füllen" },
  help: [{ en: "Move into rock to dig it (costs energy); bright cells are ore.", de: "In Gestein hineinbewegen, um zu graben (kostet Energie); helle Zellen sind Erz." },
         { en: "Return to the top surface to bank your carried ore. Reach the DEPOT quota to win — energy is limited, so plan short trips.", de: "Kehre zur Oberfläche zurück, um getragenes Erz einzuzahlen. Erreiche die DEPOT-Quote zum Sieg — Energie ist begrenzt, plane kurze Wege." }],
  create: function (api) {
    var COLS = 16, ROWS = 12, CELL = 34, W = COLS * CELL, H = ROWS * CELL, QUOTA = 8;
    var ctx = api.canvas(W, H).getContext('2d');
    var cellv, drone, energy, carry, banked, done, repAcc; // cellv: 0 empty, 1 stone, 2 ore
    function k(x, y) { return y * COLS + x; }
    function reset() {
      cellv = []; energy = 90; carry = 0; banked = 0; done = false; repAcc = 0;
      for (var y = 0; y < ROWS; y++) for (var x = 0; x < COLS; x++) cellv[k(x, y)] = y === 0 ? 0 : (Math.random() < 0.20 ? 2 : 1);
      drone = { x: (COLS / 2) | 0, y: 0 };
      api.hud({ energy: energy, ore: 0, depot: '0/' + QUOTA }); draw();
    }
    function move(dx, dy) {
      if (done) return; var nx = drone.x + dx, ny = drone.y + dy; if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) return;
      var v = cellv[k(nx, ny)];
      if (v === 1) { energy -= 2; cellv[k(nx, ny)] = 0; }
      else if (v === 2) { energy -= 3; cellv[k(nx, ny)] = 0; carry += 1; api.hud({ ore: carry }); }
      else energy -= 1;
      drone.x = nx; drone.y = ny; api.hud({ energy: Math.max(0, energy) });
      // Surfacing banks the carried ore (ore only counts once delivered up top).
      if (ny === 0 && carry > 0) { banked += carry; carry = 0; api.hud({ ore: 0, depot: banked + '/' + QUOTA }); }
      if (banked >= QUOTA) { done = true; var rating = banked >= 14 ? 3 : banked >= 10 ? 2 : 1; api.complete({ score: banked * 30, rating: rating }); return; }
      if (energy <= 0) { done = true; api.fail({ score: banked * 10 }); return; }
      draw();
    }
    api.bind('Left', function () { move(-1, 0); }); api.bind('Right', function () { move(1, 0); });
    api.bind('Up', function () { move(0, -1); }); api.bind('Down', function () { move(0, 1); });
    api.loop(function (dt) { repAcc += dt; if (repAcc > 0.12) { repAcc = 0; if (api.held('Left')) move(-1, 0); else if (api.held('Right')) move(1, 0); else if (api.held('Up')) move(0, -1); else if (api.held('Down')) move(0, 1); } });
    function draw() {
      ctx.clearRect(0, 0, W, H);
      for (var y = 0; y < ROWS; y++) for (var x = 0; x < COLS; x++) { var v = cellv[k(x, y)];
        if (v === 1) { ctx.fillStyle = 'rgba(70,214,255,0.13)'; ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2); }
        else if (v === 2) { ctx.fillStyle = 'rgba(124,255,176,0.85)'; ctx.fillRect(x * CELL + 6, y * CELL + 6, CELL - 12, CELL - 12); } }
      ctx.fillStyle = 'rgba(124,255,176,0.12)'; ctx.fillRect(0, 0, W, CELL); // surface
      ctx.fillStyle = '#46d6ff'; ctx.shadowColor = '#46d6ff'; ctx.shadowBlur = 10; ctx.fillRect(drone.x * CELL + 5, drone.y * CELL + 5, CELL - 10, CELL - 10); ctx.shadowBlur = 0;
    }
    return { start: reset };
  }
});
</script></body></html>
