<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css">
<style>
 .vsgrid{display:grid;grid-template-columns:repeat(6,84px);gap:10px}
 .vscard{width:84px;height:104px;border-radius:9px;font-size:38px;display:flex;align-items:center;justify-content:center;
   background:linear-gradient(160deg,#0e2a3e,#0a1f30);border:1px solid var(--line);color:var(--cyan);cursor:pointer;transition:transform .08s,border-color .12s,opacity .2s}
 .vscard:hover{border-color:var(--cyan)}
 .vscard.sel{border-color:var(--cyan);box-shadow:0 0 14px rgba(70,214,255,.55) inset;transform:translateY(-4px)}
 .vscard.gone{opacity:0;pointer-events:none}
 .vscard.bad{border-color:var(--bad);color:var(--bad)}
</style></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Void Solitaire", de: "Void-Solitär" }, difficulty: 1,
  desc: { en: "A quiet card sweep for the long haul. Clear the board by tapping matching pairs of symbols.",
          de: "Ein ruhiges Kartenspiel für die lange Reise. Räume das Feld, indem du gleiche Symbol-Paare antippst." },
  hint: { en: "Click two matching cards to clear them", de: "Zwei gleiche Karten anklicken zum Entfernen" },
  help: [{ en: "Click a card, then another with the same symbol — both clear", de: "Karte anklicken, dann eine mit gleichem Symbol — beide verschwinden" },
         { en: "Clear the whole board; fewer mismatches scores higher", de: "Räume das ganze Feld; weniger Fehlversuche geben mehr Punkte" }],
  create: function (api) {
    var SYM = ['★', '☄', '⬡', '◆', '☢', '⚛', '✺', '❄', '⬣', '✦', '☾', '✧'];
    var grid = api.el('div', 'vsgrid', api.stage);
    var first, lock, left, miss;
    function reset() {
      grid.innerHTML = ''; first = null; lock = false; miss = 0;
      var pool = SYM.slice(0, 12); var deck = api.shuffle(pool.concat(pool)); left = deck.length;
      api.hud({ left: left, misses: 0 });
      deck.forEach(function (sym) { var el = api.el('div', 'vscard', grid, sym); el.dataset.s = sym; api.clickable(el, function () { pick(el); }); });
    }
    function pick(el) {
      if (lock || el.classList.contains('gone') || el === first) return;
      el.classList.add('sel');
      if (!first) { first = el; return; }
      if (first.dataset.s === el.dataset.s) {
        first.classList.add('gone'); el.classList.add('gone'); first = null; left -= 2; api.hud({ left: left });
        if (left === 0) { var rating = miss === 0 ? 3 : miss <= 4 ? 2 : 1; api.complete({ score: Math.max(50, 1000 - miss * 40), rating: rating }); }
      } else {
        miss++; api.hud({ misses: miss }); lock = true; var a = first, b = el; a.classList.add('bad'); b.classList.add('bad'); first = null;
        api.after(function () { a.classList.remove('sel', 'bad'); b.classList.remove('sel', 'bad'); lock = false; }, 500);
      }
    }
    return { start: reset };
  }
});
</script></body></html>
