<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<link rel="stylesheet" href="../_shared/theme.css">
<style>
 .cswrap{display:flex;flex-direction:column;align-items:center;gap:28px}
 .cscrate{width:120px;height:120px;font-size:60px;display:flex;align-items:center;justify-content:center;
   border:1px solid var(--cyan);border-radius:12px;background:var(--panel2);box-shadow:0 0 24px rgba(70,214,255,0.25)}
 .csbins{display:flex;gap:18px}
 .csbin{width:130px;height:110px;font-size:46px;border:1px solid var(--line);border-radius:10px;background:var(--panel2);
   display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;color:var(--ink)}
 .csbin.sel{border-color:var(--cyan);box-shadow:0 0 14px rgba(70,214,255,0.5)}
 .csbin small{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:6px}
</style></head><body>
<script src="../_shared/framework.js"></script>
<script>
BBTS.register({
  title: { en: "Cargo Sorter", de: "Frachtsortierer" }, difficulty: 2,
  desc: { en: "Route each incoming crate to the matching cargo bay. Keep up as the belt speeds up — five mistakes ends the shift.",
          de: "Leite jede ankommende Kiste in die passende Frachtbucht. Bleib dran, wenn das Band schneller wird — fünf Fehler beenden die Schicht." },
  hint: { en: "← → choose bay · Enter confirm · or click a bay", de: "← → Bucht wählen · Enter bestätigen · oder Bucht anklicken" },
  help: [{ en: "Match the crate's symbol to a cargo bay", de: "Symbol der Kiste einer Frachtbucht zuordnen" },
         { en: "← → select, Enter confirm, or click the bay", de: "← → wählen, Enter bestätigen, oder Bucht klicken" }],
  create: function (api) {
    var CATS = [{ s: "⛏", c: { en: "Ore", de: "Erz" } }, { s: "⚙", c: { en: "Tech", de: "Technik" } },
                { s: "❀", c: { en: "Bio", de: "Bio" } }, { s: "⚡", c: { en: "Energy", de: "Energie" } }];
    var wrap = api.el('div', 'cswrap', api.stage);
    var crateEl = api.el('div', 'cscrate', wrap);
    var binsEl = api.el('div', 'csbins', wrap), binEls = [];
    CATS.forEach(function (cat, i) { var b = api.el('div', 'csbin', binsEl, cat.s + '<small>' + api.t(cat.c) + '</small>'); api.clickable(b, function () { assign(i); }); binEls.push(b); });
    var cur, sel, score, mistakes, time, done, nextIn, rate;
    function reset() { score = 0; mistakes = 0; time = 0; done = false; sel = 0; rate = 2.0; spawn(); render(); api.hud({ score: 0, errors: '0/5' }); }
    function spawn() { cur = api.rand(CATS.length); crateEl.textContent = CATS[cur].s; }
    function render() { binEls.forEach(function (b, i) { b.classList.toggle('sel', i === sel); }); }
    function assign(i) {
      if (done) return;
      if (i === cur) { score += 10; api.hud({ score: score }); } else { mistakes++; api.hud({ errors: mistakes + '/5' }); }
      if (mistakes >= 5) { done = true; api.fail({ score: score }); return; }
      spawn();
    }
    api.bind('Left', function () { sel = (sel + CATS.length - 1) % CATS.length; render(); });
    api.bind('Right', function () { sel = (sel + 1) % CATS.length; render(); });
    api.bind('Confirm', function () { assign(sel); }); api.bind('Primary', function () { assign(sel); });
    api.loop(function (dt) { if (done) return; time += dt; if (time > 90) { done = true; var rating = mistakes === 0 ? 3 : mistakes <= 2 ? 2 : 1; api.complete({ score: score, rating: rating }); } });
    return { start: reset };
  }
});
</script></body></html>
