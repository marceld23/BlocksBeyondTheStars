# Builds the Windows, Linux + (experimental) macOS players and publishes a GitHub Release.
#
# Triggered ONLY by pushing a version tag (or the manual "Run workflow" button), never by
# pull_request — so forked PRs can never reach the Unity license secret. In a PUBLIC repo,
# GitHub secrets stay masked in logs and are unavailable to fork PRs, so UNITY_LICENSE is safe.
#
# One-time setup (Unity Personal):
#   1. Get your license file: run the GameCI activation flow
#      (https://game.ci/docs/github/activation) to obtain a Unity_v6.x.ulf.
#   2. Repo -> Settings -> Secrets and variables -> Actions -> add three repository secrets:
#        UNITY_LICENSE  = the full contents of that .ulf file
#        UNITY_EMAIL    = your Unity account email
#        UNITY_PASSWORD = your Unity account password
#   3. Push a tag:  git tag v1.0.0 && git push origin v1.0.0
#
# Why split jobs: the Unity build runs in GameCI's Linux Docker image (Windows, Linux and macOS
# players are all cross-built with the Mono backend — macOS too, so no Mac runner is needed). The
# WinForms launcher needs the Windows Desktop SDK, so it is built on a windows-latest runner and
# merged into the Windows player afterwards. Per-platform package jobs publish the installers/zips,
# and a final job builds the optional dedicated-server Docker image (reusable docker.yml) and
# pushes it to GHCR on a tag.
#
# macOS is EXPERIMENTAL: the .app is unsigned and un-notarized (Phase 1 = plain zip, no Velopack,
# no splash launcher). Users clear the Gatekeeper quarantine once — see README "Platforms".

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub Release

# Serialize release runs: a second tag push (or a manual dispatch landing on top of one) queues rather than
# racing the first. We do NOT cancel-in-progress here (unlike ci.yml) — a half-published release is worse
# than a slightly delayed one, so an in-flight run is allowed to finish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Single source of truth for the version, resolved ONCE and consumed by every build/package/docker job
  # (so the resolve+validate logic is not copy-pasted per platform). A tag push (vX.Y.Z) defines the version
  # for the whole build — in-game (Application.version), the launcher and the Velopack installers all derive
  # from it. A manual workflow_dispatch run has no tag, so it builds a 0.1.0-dev test artifact (and never
  # publishes). (Velopack requires packVersion >= 0.0.1, so the dev value can't be 0.0.0-*.) No checkout
  # needed — it only reads GITHUB_REF, so this job is a few seconds.
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve + validate version
        id: resolve
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
            if ! printf '%s' "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
              echo "::error::Tag '$GITHUB_REF_NAME' is not SemVer — expected vX.Y.Z (e.g. v0.3.0)."
              exit 1
            fi
          else
            v="0.1.0-dev"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved build version: $v"

  build-player:
    name: Build Unity player (Windows)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # StreamingAssets/ (data + web + bundled server) and Plugins/ (shared libs) are gitignored
      # generated content, so they must be produced before the Unity build. pwsh ships on the runner.
      - name: Sync shared libs + content
        shell: pwsh
        run: ./scripts/sync-client-libs.ps1

      # The client's in-app updater (ClientUpdater.cs) references Velopack in the player build
      # (#if !UNITY_EDITOR). Velopack is a client-only dep with its own sync step; without it the
      # StandaloneWindows64 script compile fails with CS0246 'Velopack'. Must run after sync-client-libs
      # so it skips the System.* facades that script already placed.
      - name: Sync Velopack libs
        shell: pwsh
        run: ./scripts/sync-velopack-libs.ps1

      - name: Publish bundled local server (win-x64)
        shell: pwsh
        run: ./scripts/publish-local-server.ps1 -Runtime win-x64

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: client/Library
          key: Library-${{ hashFiles('client/Assets/**', 'client/Packages/**', 'client/ProjectSettings/**') }}
          restore-keys: |
            Library-

      # The ~6 GB GameCI editor image plus the restored Library cache overflow the hosted runner's
      # ~14 GB free disk ("no space left on device"). Drop preinstalled toolchains we don't need
      # (our .NET steps already ran) to free ~25 GB before the Docker pull.
      - name: Free disk space for the Unity image
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/local/.ghcup
          sudo docker image prune --all --force || true
          echo "After:"; df -h /

      - name: Inject player-feedback API key
        # Writes the git-ignored BugReportBuildSecrets.Generated.cs so the player can POST feedback to the
        # website. Guarded: without the secret the build still works (feedback just stays disabled). The key
        # is only a spam gate, not a real secret; GitHub masks it in logs.
        env:
          WIX_BUGREPORT_API_KEY: ${{ secrets.WIX_BUGREPORT_API_KEY }}
        run: |
          if [ -z "$WIX_BUGREPORT_API_KEY" ]; then
            echo "WIX_BUGREPORT_API_KEY not set — player feedback will be disabled in this build."
            exit 0
          fi
          {
            echo '// CI-generated from the WIX_BUGREPORT_API_KEY secret — not committed.'
            echo 'namespace BlocksBeyondTheStars.Build'
            echo '{'
            echo '    public static partial class BugReportBuildSecrets'
            echo '    {'
            echo "        static partial void ApplyApiKey(ref string key) => key = \"$WIX_BUGREPORT_API_KEY\";"
            echo '    }'
            echo '}'
          } > client/Assets/BlocksBeyondTheStars/Scripts/BugReportBuildSecrets.Generated.cs
          echo "Injected feedback API key into the build."

      - name: Build Windows player
        uses: game-ci/unity-builder@d829bfc901f2347c8fe18898f06712b66916ef42 # v5
        env:
          # Unity Personal needs all three: the .ulf contents + the account email & password.
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: client
          unityVersion: 6000.4.9f1
          targetPlatform: StandaloneWindows64
          buildMethod: BlocksBeyondTheStars.Client.EditorTools.BuildScript.BuildWindows
          # GameCI always applies its versioning to PlayerSettings.bundleVersion (overriding anything our
          # build method sets), so we drive it directly: Custom + our exact resolved version (the git tag).
          # This makes Application.version in-game == the release version. BuildScript writes version.txt
          # from the resulting bundleVersion, which the guard checks.
          versioning: Custom
          version: ${{ needs.version.outputs.version }}
          # BuildScript reads -buildOut and writes version.txt from the bundleVersion GameCI applied above.
          # allowDirtyBuild because the synced StreamingAssets/Plugins make the tree "dirty" for GameCI.
          customParameters: -buildOut /github/workspace/player
          allowDirtyBuild: true

      # GameCI runs Unity as root; make the output readable by the (non-root) runner user.
      - name: Fix output permissions
        run: sudo chmod -R a+rwX player

      # Guard: the version baked into the player must equal the resolved tag version (single-source-of-truth).
      - name: Verify baked version matches the tag
        shell: bash
        run: |
          baked="$(cat player/version.txt)"
          echo "Baked into player: '$baked' — expected: '${{ needs.version.outputs.version }}'"
          test "$baked" = "${{ needs.version.outputs.version }}"

      - name: Upload player artifact
        uses: actions/upload-artifact@v6
        with:
          name: player-windows
          path: player

  build-player-linux:
    name: Build Unity player (Linux)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Sync shared libs + content (bash)
        run: ./scripts/sync-client-libs.sh

      - name: Sync Velopack libs (bash)
        run: ./scripts/sync-velopack-libs.sh

      - name: Publish bundled local server (linux-x64)
        run: ./scripts/publish-local-server.sh linux-x64

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: client/Library
          key: Library-Linux-${{ hashFiles('client/Assets/**', 'client/Packages/**', 'client/ProjectSettings/**') }}
          restore-keys: |
            Library-Linux-

      - name: Free disk space for the Unity image
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/local/.ghcup
          sudo docker image prune --all --force || true
          echo "After:"; df -h /

      - name: Inject player-feedback API key
        env:
          WIX_BUGREPORT_API_KEY: ${{ secrets.WIX_BUGREPORT_API_KEY }}
        run: |
          if [ -z "$WIX_BUGREPORT_API_KEY" ]; then
            echo "WIX_BUGREPORT_API_KEY not set — player feedback will be disabled in this build."
            exit 0
          fi
          {
            echo '// CI-generated from the WIX_BUGREPORT_API_KEY secret — not committed.'
            echo 'namespace BlocksBeyondTheStars.Build'
            echo '{'
            echo '    public static partial class BugReportBuildSecrets'
            echo '    {'
            echo "        static partial void ApplyApiKey(ref string key) => key = \"$WIX_BUGREPORT_API_KEY\";"
            echo '    }'
            echo '}'
          } > client/Assets/BlocksBeyondTheStars/Scripts/BugReportBuildSecrets.Generated.cs
          echo "Injected feedback API key into the build."

      - name: Build Linux player
        uses: game-ci/unity-builder@d829bfc901f2347c8fe18898f06712b66916ef42 # v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: client
          unityVersion: 6000.4.9f1
          targetPlatform: StandaloneLinux64
          buildMethod: BlocksBeyondTheStars.Client.EditorTools.BuildScript.BuildLinux
          versioning: Custom
          version: ${{ needs.version.outputs.version }}
          customParameters: -buildOut /github/workspace/player-linux
          allowDirtyBuild: true

      - name: Fix output permissions
        run: sudo chmod -R a+rwX player-linux

      - name: Verify baked version matches the tag
        shell: bash
        run: |
          baked="$(cat player-linux/version.txt)"
          echo "Baked into player: '$baked' — expected: '${{ needs.version.outputs.version }}'"
          test "$baked" = "${{ needs.version.outputs.version }}"

      # The "Free disk space" step above deletes /usr/share/dotnet to make room for the Unity image, so the
      # SDK is gone by now. Re-install it before publishing the launcher (cheap; the heavy build is done).
      - name: Re-install .NET (disk-cleanup removed it)
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Build Linux console launcher
        run: |
          dotnet publish src/BlocksBeyondTheStars.Launcher.Console/BlocksBeyondTheStars.Launcher.Console.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ needs.version.outputs.version }} \
            -o artifacts/launcher-linux
          cp artifacts/launcher-linux/BlocksBeyondTheStars.Launcher.Console player-linux/

      - name: Upload Linux player artifact
        uses: actions/upload-artifact@v6
        with:
          name: player-linux
          path: player-linux

  # macOS player (experimental). Built on a Linux runner: the project uses the Mono scripting backend, so
  # GameCI cross-compiles StandaloneOSX without Mac hardware. The result is an unsigned/un-notarized .app
  # bundle (Phase 1: zipped as-is, no Velopack, no splash launcher). Mirrors build-player-linux step-for-step.
  build-player-mac:
    name: Build Unity player (macOS)
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Sync shared libs + content (bash)
        run: ./scripts/sync-client-libs.sh

      - name: Sync Velopack libs (bash)
        run: ./scripts/sync-velopack-libs.sh

      - name: Publish bundled local server (osx-x64)
        run: ./scripts/publish-local-server.sh osx-x64

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: client/Library
          key: Library-macOS-${{ hashFiles('client/Assets/**', 'client/Packages/**', 'client/ProjectSettings/**') }}
          restore-keys: |
            Library-macOS-

      - name: Free disk space for the Unity image
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/local/.ghcup
          sudo docker image prune --all --force || true
          echo "After:"; df -h /

      - name: Inject player-feedback API key
        env:
          WIX_BUGREPORT_API_KEY: ${{ secrets.WIX_BUGREPORT_API_KEY }}
        run: |
          if [ -z "$WIX_BUGREPORT_API_KEY" ]; then
            echo "WIX_BUGREPORT_API_KEY not set — player feedback will be disabled in this build."
            exit 0
          fi
          {
            echo '// CI-generated from the WIX_BUGREPORT_API_KEY secret — not committed.'
            echo 'namespace BlocksBeyondTheStars.Build'
            echo '{'
            echo '    public static partial class BugReportBuildSecrets'
            echo '    {'
            echo "        static partial void ApplyApiKey(ref string key) => key = \"$WIX_BUGREPORT_API_KEY\";"
            echo '    }'
            echo '}'
          } > client/Assets/BlocksBeyondTheStars/Scripts/BugReportBuildSecrets.Generated.cs
          echo "Injected feedback API key into the build."

      - name: Build macOS player
        uses: game-ci/unity-builder@d829bfc901f2347c8fe18898f06712b66916ef42 # v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: client
          unityVersion: 6000.4.9f1
          targetPlatform: StandaloneOSX
          buildMethod: BlocksBeyondTheStars.Client.EditorTools.BuildScript.BuildMacOS
          versioning: Custom
          version: ${{ needs.version.outputs.version }}
          customParameters: -buildOut /github/workspace/player-mac
          allowDirtyBuild: true

      - name: Fix output permissions
        run: sudo chmod -R a+rwX player-mac

      - name: Verify baked version matches the tag
        shell: bash
        run: |
          baked="$(cat player-mac/version.txt)"
          echo "Baked into player: '$baked' — expected: '${{ needs.version.outputs.version }}'"
          test "$baked" = "${{ needs.version.outputs.version }}"

      - name: Upload macOS player artifact
        uses: actions/upload-artifact@v6
        with:
          name: player-mac
          path: player-mac

  # Linux packaging
  package-linux:
    name: Package + release (Linux)
    needs: [version, build-player-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Install Velopack CLI (pinned)
        run: |
          dotnet tool install -g vpk --version 1.2.0
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Download Linux player artifact
        uses: actions/download-artifact@v7
        with:
          name: player-linux
          path: client/Build/Linux

      # GitHub artifacts drop the Unix execute bit. Restore it on the main player AND the bundled local
      # server before packing, otherwise Singleplayer's Process.Start on the server fails with EACCES
      # inside the AppImage (see LocalServerLauncher.cs — it runs StreamingAssets/server/...GameServer).
      - name: Restore execute bits (player + bundled server)
        run: |
          chmod +x client/Build/Linux/BlocksBeyondTheStars.x86_64
          chmod +x client/Build/Linux/BlocksBeyondTheStars_Data/StreamingAssets/server/BlocksBeyondTheStars.GameServer

      # vpk can produce AppImage + portable zip for Linux. NOTE: the splash options
      # (--splashImage / --splashProgressColor) are Windows-installer only — the Linux `vpk pack`
      # rejects them ("Unrecognized command or argument"), so they are not passed here.
      - name: Package Linux AppImage + Portable
        run: |
          OUT="artifacts/installer-linux"
          mkdir -p "$OUT"

          vpk pack \
            --packId BlocksBeyondTheStars \
            --packVersion ${{ needs.version.outputs.version }} \
            --packTitle 'Blocks Beyond the Stars' \
            --packAuthors 'JuMaVe Games' \
            --packDir client/Build/Linux \
            --mainExe BlocksBeyondTheStars.Launcher.Console \
            --channel linux \
            --outputDir "$OUT"

      - name: Upload Linux installer artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-installers
          path: artifacts/installer-linux

      - name: Publish GitHub Release (Linux assets)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: |
            artifacts/installer-linux/*AppImage
            artifacts/installer-linux/*Portable.zip
          generate_release_notes: false

  # macOS packaging (experimental, no signing/notarization). Velopack is skipped on purpose: we just zip
  # the .app and document the Gatekeeper quarantine workaround in the README/release notes. Mirrors the
  # Linux packaging job; the only macOS-specific care is preserving the bundle's symlinks (zip -y) and the
  # execute bits (artifacts strip them).
  package-mac:
    name: Package + release (macOS)
    needs: [version, build-player-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download macOS player artifact
        uses: actions/download-artifact@v7
        with:
          name: player-mac
          path: client/Build/macOS

      # Artifacts strip Unix perms — restore +x on the bundle's entry binary AND the bundled local server,
      # otherwise Singleplayer can't spawn the server on macOS (LocalServerLauncher.cs).
      - name: Restore execute bits (app + bundled server)
        run: |
          APP="client/Build/macOS/BlocksBeyondTheStars.app"
          chmod +x "$APP/Contents/MacOS/"*
          chmod +x "$APP/Contents/Resources/Data/StreamingAssets/server/BlocksBeyondTheStars.GameServer"

      # zip -y preserves the symlinks inside the .app bundle; a plain upload-artifact re-zip would corrupt it.
      - name: Zip the .app
        run: |
          OUT="artifacts/installer-mac"
          mkdir -p "$OUT"
          ( cd client/Build/macOS && \
            zip -ry "$GITHUB_WORKSPACE/$OUT/BlocksBeyondTheStars-osx-${{ needs.version.outputs.version }}-Portable.zip" \
              "BlocksBeyondTheStars.app" )

      - name: Upload macOS installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: mac-installers
          path: artifacts/installer-mac

      - name: Publish GitHub Release (macOS assets)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          files: artifacts/installer-mac/*Portable.zip
          generate_release_notes: false

  # Optional dedicated-server Docker image. Reuses .github/workflows/docker.yml (workflow_call). It only
  # needs the resolved version (from the lightweight `version` job, NOT the Unity player), so it starts
  # immediately and runs fully in parallel with the player builds — no waiting on the ~13 min Unity build.
  # The image is PUSHED to GHCR only on a real tag (multi-arch, tagged with the version + `latest`); a manual
  # workflow_dispatch run just build-validates it — same publish gating as the GitHub Release / itch.io steps.
  docker:
    name: Dedicated-server image
    needs: version
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker.yml
    with:
      push: ${{ startsWith(github.ref, 'refs/tags/') }}
      latest: ${{ startsWith(github.ref, 'refs/tags/') }}
      tag: ${{ needs.version.outputs.version }}
      platforms: linux/amd64,linux/arm64
    secrets: inherit

  package:
    name: Package + release (Windows)
    needs: [version, build-player]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      # Self-contained single-file launcher (same flags as scripts/build-client.ps1) so it needs no
      # .NET runtime on the player's machine. -p:Version stamps it with the same release version.
      - name: Build loading-splash launcher
        run: >
          dotnet publish src/BlocksBeyondTheStars.Launcher/BlocksBeyondTheStars.Launcher.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true
          -p:Version=${{ needs.version.outputs.version }}
          -o artifacts/launcher

      # Download the player into the layout publish-client-installer.ps1 expects (its default -BuildDir).
      - name: Download player artifact
        uses: actions/download-artifact@v7
        with:
          name: player-windows
          path: client/Build/Windows

      - name: Add launcher to the player folder
        shell: pwsh
        run: Copy-Item artifacts/launcher/BlocksBeyondTheStars.Launcher.exe client/Build/Windows/ -Force

      # Pin vpk to the vendored Velopack runtime version (sync-velopack-libs.ps1 = 1.2.0) for reproducible
      # packaging, and expose it on PATH so the script's own `Get-Command vpk` check finds it.
      - name: Install Velopack CLI (pinned)
        shell: pwsh
        run: |
          dotnet tool install -g vpk --version 1.2.0
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # Produces the Windows installer trio in artifacts/installer: Setup.exe (per-user, no admin),
      # the WiX MSI (machine-wide for IT/MDM), and a portable zip — plus the update feed (.nupkg/RELEASES).
      - name: Package installers (Setup.exe + MSI + Portable)
        shell: pwsh
        run: ./scripts/publish-client-installer.ps1 -Version ${{ needs.version.outputs.version }} -Msi

      # Only a tag push can create a Release. A manual workflow_dispatch run still builds the installers
      # (verifiable from the run logs) but skips publishing.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          # `body` is PREPENDED to the auto-generated notes (GitHub API: generate_release_notes keeps a
          # supplied body and appends the changelog after it). So the Docker pull lines show at the top,
          # the generated changelog below. The image itself is pushed to GHCR by the `docker` job — it is
          # NOT a release asset, so this is how it surfaces on the release page.
          body: |
            ### 🐳 Docker (dedicated server)

            Run the dedicated server (game server + admin/portal/download UI, optional AI backend) on any OS with Docker:

            ```bash
            docker pull ghcr.io/marceld23/blocks-beyond-the-stars-server:${{ needs.version.outputs.version }}
            # or the rolling tag:
            docker pull ghcr.io/marceld23/blocks-beyond-the-stars-server:latest
            ```

            Setup & configuration: [SELF_HOSTING.md §10](https://github.com/marceld23/BlocksBeyondTheStars/blob/main/docs/developer/SELF_HOSTING.md#10-running-in-docker).
          files: |
            artifacts/installer/*Setup.exe
            artifacts/installer/*.msi
            artifacts/installer/*Portable.zip
          generate_release_notes: true

      # Mirror the same three installers to itch.io (jumavegames/blocks-beyond-the-stars) via butler — each
      # artifact to its own channel (windows-setup / windows-msi / windows-portable), stamped with the release
      # version. Runs after the GitHub Release so a butler hiccup never blocks the GitHub publish. The itch.io
      # API key is the BUTLER_API_KEY repo secret; the script auto-downloads butler.
      - name: Publish to itch.io (butler)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: ./scripts/publish-itch.ps1 -Version ${{ needs.version.outputs.version }}
