# Builds the Windows player + loading-splash launcher and publishes a GitHub Release.
#
# Triggered ONLY by pushing a version tag (or the manual "Run workflow" button), never by
# pull_request — so forked PRs can never reach the Unity license secret. In a PUBLIC repo,
# GitHub secrets stay masked in logs and are unavailable to fork PRs, so UNITY_LICENSE is safe.
#
# One-time setup (Unity Personal):
#   1. Get your license file: run the GameCI activation flow
#      (https://game.ci/docs/github/activation) to obtain a Unity_v6.x.ulf.
#   2. Repo -> Settings -> Secrets and variables -> Actions -> add three repository secrets:
#        UNITY_LICENSE  = the full contents of that .ulf file
#        UNITY_EMAIL    = your Unity account email
#        UNITY_PASSWORD = your Unity account password
#   3. Push a tag:  git tag v1.0.0 && git push origin v1.0.0
#
# Why two jobs: the Unity build runs in GameCI's Linux Docker image (Windows player cross-built
# with the Mono backend). The WinForms launcher needs the Windows Desktop SDK, so it is built on
# a windows-latest runner and merged into the player afterwards.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub Release

jobs:
  build-player:
    name: Build Unity player (Linux)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      # Version single source of truth: a tag push (vX.Y.Z) defines the version for the whole build —
      # in-game (Application.version), the launcher and the Velopack installers all derive from it. A manual
      # workflow_dispatch run has no tag, so it builds a 0.0.0-dev test artifact (and never publishes).
      - name: Resolve + validate version
        id: ver
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            v="${GITHUB_REF_NAME#v}"
            if ! printf '%s' "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.]+)?$'; then
              echo "::error::Tag '$GITHUB_REF_NAME' is not SemVer — expected vX.Y.Z (e.g. v0.3.0)."
              exit 1
            fi
          else
            v="0.0.0-dev"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved build version: $v"

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # StreamingAssets/ (data + web + bundled server) and Plugins/ (shared libs) are gitignored
      # generated content, so they must be produced before the Unity build. pwsh ships on the runner.
      - name: Sync shared libs + content
        shell: pwsh
        run: ./scripts/sync-client-libs.ps1

      # The client's in-app updater (ClientUpdater.cs) references Velopack in the player build
      # (#if !UNITY_EDITOR). Velopack is a client-only dep with its own sync step; without it the
      # StandaloneWindows64 script compile fails with CS0246 'Velopack'. Must run after sync-client-libs
      # so it skips the System.* facades that script already placed.
      - name: Sync Velopack libs
        shell: pwsh
        run: ./scripts/sync-velopack-libs.ps1

      - name: Publish bundled local server (win-x64)
        shell: pwsh
        run: ./scripts/publish-local-server.ps1 -Runtime win-x64

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: client/Library
          key: Library-${{ hashFiles('client/Assets/**', 'client/Packages/**', 'client/ProjectSettings/**') }}
          restore-keys: |
            Library-

      # The ~6 GB GameCI editor image plus the restored Library cache overflow the hosted runner's
      # ~14 GB free disk ("no space left on device"). Drop preinstalled toolchains we don't need
      # (our .NET steps already ran) to free ~25 GB before the Docker pull.
      - name: Free disk space for the Unity image
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/local/lib/android /opt/ghc /usr/share/dotnet \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/local/.ghcup
          sudo docker image prune --all --force || true
          echo "After:"; df -h /

      - name: Build Windows player
        uses: game-ci/unity-builder@v4
        env:
          # Unity Personal needs all three: the .ulf contents + the account email & password.
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: client
          unityVersion: 6000.4.9f1
          targetPlatform: StandaloneWindows64
          buildMethod: BlocksBeyondTheStars.Client.EditorTools.BuildScript.BuildWindows
          # GameCI always applies its versioning to PlayerSettings.bundleVersion (overriding anything our
          # build method sets), so we drive it directly: Custom + our exact resolved version (the git tag).
          # This makes Application.version in-game == the release version. BuildScript writes version.txt
          # from the resulting bundleVersion, which the guard checks.
          versioning: Custom
          version: ${{ steps.ver.outputs.version }}
          # BuildScript reads -buildOut and writes version.txt from the bundleVersion GameCI applied above.
          # allowDirtyBuild because the synced StreamingAssets/Plugins make the tree "dirty" for GameCI.
          customParameters: -buildOut /github/workspace/player
          allowDirtyBuild: true

      # GameCI runs Unity as root; make the output readable by the (non-root) runner user.
      - name: Fix output permissions
        run: sudo chmod -R a+rwX player

      # Guard: the version baked into the player must equal the resolved tag version (single-source-of-truth).
      - name: Verify baked version matches the tag
        shell: bash
        run: |
          baked="$(cat player/version.txt)"
          echo "Baked into player: '$baked' — expected: '${{ steps.ver.outputs.version }}'"
          test "$baked" = "${{ steps.ver.outputs.version }}"

      - name: Upload player artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-windows
          path: player

  package:
    name: Package + release (Windows)
    needs: build-player
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Self-contained single-file launcher (same flags as scripts/build-client.ps1) so it needs no
      # .NET runtime on the player's machine. -p:Version stamps it with the same release version.
      - name: Build loading-splash launcher
        run: >
          dotnet publish src/BlocksBeyondTheStars.Launcher/BlocksBeyondTheStars.Launcher.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true
          -p:Version=${{ needs.build-player.outputs.version }}
          -o artifacts/launcher

      # Download the player into the layout publish-client-installer.ps1 expects (its default -BuildDir).
      - name: Download player artifact
        uses: actions/download-artifact@v4
        with:
          name: player-windows
          path: client/Build/Windows

      - name: Add launcher to the player folder
        shell: pwsh
        run: Copy-Item artifacts/launcher/BlocksBeyondTheStars.Launcher.exe client/Build/Windows/ -Force

      # Pin vpk to the vendored Velopack runtime version (sync-velopack-libs.ps1 = 1.2.0) for reproducible
      # packaging, and expose it on PATH so the script's own `Get-Command vpk` check finds it.
      - name: Install Velopack CLI (pinned)
        shell: pwsh
        run: |
          dotnet tool install -g vpk --version 1.2.0
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # Produces the Windows installer trio in artifacts/installer: Setup.exe (per-user, no admin),
      # the WiX MSI (machine-wide for IT/MDM), and a portable zip — plus the update feed (.nupkg/RELEASES).
      - name: Package installers (Setup.exe + MSI + Portable)
        shell: pwsh
        run: ./scripts/publish-client-installer.ps1 -Version ${{ needs.build-player.outputs.version }} -Msi

      # Only a tag push can create a Release. A manual workflow_dispatch run still builds the installers
      # (verifiable from the run logs) but skips publishing.
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/installer/*Setup.exe
            artifacts/installer/*.msi
            artifacts/installer/*Portable.zip
          generate_release_notes: true
