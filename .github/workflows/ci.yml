# Fast pull-request gate: builds the .NET projects and runs the headless xUnit suites.
#
# Triggered on every pull request and on direct pushes to main — NOT by tags (that is release.yml).
# This never touches Unity: it builds and tests only the two headless suites that run on Linux —
#   tests/BlocksBeyondTheStars.Tests        (.NET server/shared xUnit, no Unity)
#   tests/BlocksBeyondTheStars.Client.Tests (real NetworkClient vs in-process GameServer, no Unity/sockets)
# The Unity Edit/PlayMode suites need the editor and stay opt-in/local (see scripts/run-tests.ps1).
#
# TWO-TIER TEST GATE: pull requests run only the fast tier (--filter Category!=Slow); pushes to main run
# the full suite, and release.yml re-runs the full suite on the tagged commit before publishing anything.
# So a PR check is fast (~6 min instead of ~13), while every commit that lands on main — and every
# release — is still covered by all tests. See the Test step below for details.
#
# We target the test projects directly (not the whole .sln) on purpose: the .sln also contains the
# WinForms launcher (net8.0-windows), which cannot build on the Linux runner. Building the test
# projects pulls in exactly their dependencies (server/shared/client.core) and nothing Windows-only.
#
# Warnings ARE enforced here: the build runs with -warnaserror so any analyzer/compiler warning fails
# the PR, even though the local build keeps TreatWarningsAsErrors=false (Directory.Build.props) for a
# friction-free dev loop. The tree currently builds clean (0 warnings), so this only guards regressions.
#
# REQUIRED-CHECK SAFE doc/screenshot-only skip: rather than skipping the whole workflow with paths-ignore
# (which would leave a *required* check stuck on "Expected — Waiting for status" for a docs-only PR), the
# workflow always runs and a `changes` job decides whether the heavy `build-test`/`format` jobs run. On a
# doc- or image-only PR they are skipped via their `if:`, and GitHub counts a skipped required job as a
# pass — so the `Build + test (.NET, headless)` check still reports green and never blocks the PR. Any
# code/content file in the diff makes them run for real. The doc/image skip list lives in the shared
# reusable workflow .github/workflows/detect-doc-only.yml (also used by lint.yml and codeql.yml).

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# A newer push to the same PR/branch cancels the older still-running check.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Decides whether the PR diff contains anything other than documentation or images. Always runs (no
  # job-level `if:`) so that on a push to main it succeeds and the downstream `needs: changes` is met;
  # the detection itself is PR-only (see the reusable workflow). `nondocs` is consumed by build-test/format.
  changes:
    uses: ./.github/workflows/detect-doc-only.yml

  build-test:
    name: Build + test (.NET, headless)
    needs: changes
    # Run for any push to main, or for a PR that touched at least one non-doc file. A docs-only PR
    # skips this job; a skipped required check counts as passing, so docs PRs are never blocked.
    if: github.event_name != 'pull_request' || needs.changes.outputs.nondocs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: |
          dotnet restore tests/BlocksBeyondTheStars.Tests/BlocksBeyondTheStars.Tests.csproj
          dotnet restore tests/BlocksBeyondTheStars.Client.Tests/BlocksBeyondTheStars.Client.Tests.csproj

      # -warnaserror promotes every compiler/analyzer warning to a build error for the PR gate.
      - name: Build (treat warnings as errors)
        run: |
          dotnet build tests/BlocksBeyondTheStars.Tests/BlocksBeyondTheStars.Tests.csproj --no-restore -warnaserror
          dotnet build tests/BlocksBeyondTheStars.Client.Tests/BlocksBeyondTheStars.Client.Tests.csproj --no-restore -warnaserror

      # Two-tier test gate: PRs skip the ~31 tests marked [Trait("Category", "Slow")] — the statistical
      # worldgen/simulation heavies (10 s–320 s each) that make up ~55% of the suite's CPU time — cutting
      # the PR check from ~13 min to ~6 min. Full coverage is still guaranteed twice downstream: every
      # push to main runs the COMPLETE suite here (empty filter), and release.yml runs it again on the
      # tagged commit before anything is published.
      - name: Test
        env:
          # xUnit maps [Trait("Category", ...)] to the vstest Category property.
          FILTER: ${{ github.event_name == 'pull_request' && 'Category!=Slow' || '' }}
        run: |
          dotnet test tests/BlocksBeyondTheStars.Tests/BlocksBeyondTheStars.Tests.csproj --no-build ${FILTER:+--filter "$FILTER"} --logger "trx;LogFileName=server.trx" --results-directory TestResults
          dotnet test tests/BlocksBeyondTheStars.Client.Tests/BlocksBeyondTheStars.Client.Tests.csproj --no-build ${FILTER:+--filter "$FILTER"} --logger "trx;LogFileName=clientcore.trx" --results-directory TestResults

      # Keep the .trx results even when a suite fails, so failures are inspectable from the run page.
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: TestResults/*.trx
          if-no-files-found: ignore

  # Verifies C# code style/formatting (whitespace, using-order, object-initializer line breaks, …) per
  # .editorconfig. Runs against BlocksBeyondTheStars.CI.slnf, a solution filter listing every project EXCEPT
  # the Windows-only WinForms launcher, so the whole set loads on the Linux runner. Line endings are LF here
  # (.gitattributes eol=lf + .editorconfig end_of_line=lf agree), so the check is consistent on every fresh
  # checkout. Gated like build-test so docs-only PRs skip it (a skipped required job still counts as passing).
  format:
    name: Format (dotnet format)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.nondocs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: dotnet format --verify-no-changes
        run: dotnet format BlocksBeyondTheStars.CI.slnf --verify-no-changes
